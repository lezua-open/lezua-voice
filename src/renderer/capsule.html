<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: http: ws: wss:;">
  <title>Voice Capsule</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; padding: 8px; }
    .capsule {
      min-width: 240px; max-width: 560px; height: 56px; padding: 0 18px; border-radius: 28px;
      background: rgba(30, 34, 44, 0.86); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.10); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.24);
      display: flex; align-items: center; gap: 14px; color: #f8fafc; transform: scale(0.96); opacity: 0;
      transition: transform 220ms ease, opacity 220ms ease;
    }
    .capsule.visible { opacity: 1; transform: scale(1); }
    .waveform { width: 44px; height: 32px; display: flex; align-items: center; justify-content: space-between; flex: 0 0 auto; }
    .wave-bar { width: 6px; min-height: 4px; border-radius: 999px; background: linear-gradient(180deg, #67e8f9, #22d3ee); box-shadow: 0 0 10px rgba(34, 211, 238, 0.25); transition: height 70ms linear; }
    .text-wrap { min-width: 160px; max-width: 460px; display: flex; flex-direction: column; justify-content: center; gap: 2px; overflow: hidden; }
    .title { font-size: 13px; line-height: 1.2; color: rgba(255, 255, 255, 0.70); }
    .content { font-size: 14px; line-height: 1.3; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .error { color: #fca5a5; }
    .success { color: #86efac; }
  </style>
</head>
<body>
  <div class="capsule" id="capsule">
    <div class="waveform" id="waveform"></div>
    <div class="text-wrap">
      <div class="title" id="title">就绪</div>
      <div class="content" id="content">按一次快捷键开始，再按一次结束</div>
    </div>
  </div>

  <script>
    const State = { IDLE: 'idle', RECORDING: 'recording', PROCESSING: 'processing', REFINING: 'refining', SUCCESS: 'success', ERROR: 'error' };
    const BAR_WEIGHTS = [0.5, 0.8, 1.0, 0.75, 0.55];
    const ATTACK = 0.4;
    const RELEASE = 0.15;
    const MIN_BAR = 4;
    const MAX_BAR = 32;
    const TARGET_SAMPLE_RATE = 16000;

    const capsule = document.getElementById('capsule');
    const waveform = document.getElementById('waveform');
    const titleEl = document.getElementById('title');
    const contentEl = document.getElementById('content');

    const bars = [];
    let currentState = State.IDLE;
    let mediaStream = null;
    let audioContext = null;
    let analyser = null;
    let analyserData = null;
    let processor = null;
    let sourceNode = null;
    let muteGain = null;
    let waveformFrame = null;
    let pcmChunks = [];
    let smoothedLevel = 0;
    let savedClipboard = '';
    let isInjecting = false;

    function createBars() {
      waveform.innerHTML = '';
      BAR_WEIGHTS.forEach(() => {
        const bar = document.createElement('div');
        bar.className = 'wave-bar';
        bar.style.height = `${MIN_BAR}px`;
        waveform.appendChild(bar);
        bars.push(bar);
      });
    }

    function showCapsule() {
      requestAnimationFrame(() => capsule.classList.add('visible'));
    }

    function hideCapsule() {
      capsule.classList.remove('visible');
      setTimeout(() => window.electronAPI.hideCapsule(), 220);
    }

    function setState(state, text = '') {
      currentState = state;
      titleEl.className = 'title';
      contentEl.className = 'content';

      if (state === State.IDLE) {
        titleEl.textContent = '就绪';
        contentEl.textContent = text || '按一次快捷键开始，再按一次结束';
        resetBars();
      } else if (state === State.RECORDING) {
        titleEl.textContent = '录音中';
        contentEl.textContent = text || '正在录音...';
      } else if (state === State.PROCESSING) {
        titleEl.textContent = '转写中';
        contentEl.textContent = text || '正在把语音转换成文字...';
      } else if (state === State.REFINING) {
        titleEl.textContent = '纠错中';
        contentEl.textContent = text || '正在做保守纠错...';
      } else if (state === State.SUCCESS) {
        titleEl.textContent = '完成';
        contentEl.classList.add('success');
        contentEl.textContent = text || '文本已复制到剪贴板';
      } else if (state === State.ERROR) {
        titleEl.textContent = '错误';
        contentEl.classList.add('error');
        contentEl.textContent = text || '发生错误';
        resetBars();
      }
    }

    function resetBars() {
      bars.forEach((bar) => {
        bar.style.height = `${MIN_BAR}px`;
      });
    }

    function floatTo16BitPCM(float32Array) {
      const output = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i += 1) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        output[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      return output;
    }

    function mergeFloat32Arrays(chunks) {
      const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
      const result = new Float32Array(totalLength);
      let offset = 0;
      chunks.forEach((chunk) => {
        result.set(chunk, offset);
        offset += chunk.length;
      });
      return result;
    }

    function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
      if (outputSampleRate === inputSampleRate) {
        return buffer;
      }
      const ratio = inputSampleRate / outputSampleRate;
      const newLength = Math.round(buffer.length / ratio);
      const result = new Float32Array(newLength);
      let offsetResult = 0;
      let offsetBuffer = 0;
      while (offsetResult < result.length) {
        const nextOffsetBuffer = Math.round((offsetResult + 1) * ratio);
        let accum = 0;
        let count = 0;
        for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i += 1) {
          accum += buffer[i];
          count += 1;
        }
        result[offsetResult] = count ? accum / count : 0;
        offsetResult += 1;
        offsetBuffer = nextOffsetBuffer;
      }
      return result;
    }

    function encodePcm(floatBuffer) {
      return floatTo16BitPCM(floatBuffer).buffer;
    }

    async function startAudioCapture(deviceId) {
      pcmChunks = [];
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: deviceId && deviceId !== 'default' ? { deviceId: { exact: deviceId } } : true,
      });

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.6;
      analyserData = new Uint8Array(analyser.fftSize);

      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);
      muteGain = audioContext.createGain();
      muteGain.gain.value = 0;

      processor.onaudioprocess = (event) => {
        const input = event.inputBuffer.getChannelData(0);
        pcmChunks.push(new Float32Array(input));
      };

      sourceNode.connect(analyser);
      sourceNode.connect(processor);
      processor.connect(muteGain);
      muteGain.connect(audioContext.destination);

      animateWaveform();
    }

    function animateWaveform() {
      if (!analyser || currentState !== State.RECORDING) return;

      const draw = () => {
        if (!analyser || currentState !== State.RECORDING) return;

        analyser.getByteTimeDomainData(analyserData);
        let sum = 0;
        for (let i = 0; i < analyserData.length; i += 1) {
          const normalized = (analyserData[i] - 128) / 128;
          sum += normalized * normalized;
        }

        const rms = Math.sqrt(sum / analyserData.length);
        const target = Math.min(1, rms * 5.2);
        const easing = target > smoothedLevel ? ATTACK : RELEASE;
        smoothedLevel += (target - smoothedLevel) * easing;

        BAR_WEIGHTS.forEach((weight, index) => {
          const jitter = 1 + ((Math.random() * 0.08) - 0.04);
          const height = MIN_BAR + (MAX_BAR - MIN_BAR) * smoothedLevel * weight * jitter;
          bars[index].style.height = `${Math.max(MIN_BAR, Math.min(MAX_BAR, height))}px`;
        });

        waveformFrame = requestAnimationFrame(draw);
      };

      draw();
    }

    async function stopAudioCapture() {
      if (waveformFrame) {
        cancelAnimationFrame(waveformFrame);
        waveformFrame = null;
      }

      if (processor) {
        processor.disconnect();
        processor.onaudioprocess = null;
        processor = null;
      }
      if (muteGain) {
        muteGain.disconnect();
        muteGain = null;
      }
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode = null;
      }

      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
        mediaStream = null;
      }

      const inputSampleRate = audioContext ? audioContext.sampleRate : TARGET_SAMPLE_RATE;
      if (audioContext) {
        await audioContext.close();
        audioContext = null;
      }

      analyser = null;
      analyserData = null;

      const merged = mergeFloat32Arrays(pcmChunks);
      const downsampled = downsampleBuffer(merged, inputSampleRate, TARGET_SAMPLE_RATE);
      return encodePcm(downsampled);
    }

    async function saveClipboard() {
      savedClipboard = await window.electronAPI.clipboardSave();
    }

    async function restoreClipboard() {
      await window.electronAPI.clipboardRestore(savedClipboard || '');
    }

    async function injectText(text) {
      if (isInjecting) return;
      isInjecting = true;
      let pasted = false;
      try {
        await saveClipboard();
        await window.electronAPI.clipboardWrite(text);
        pasted = await window.electronAPI.simulatePaste();
      } finally {
        setTimeout(async () => {
          try { await restoreClipboard(); } catch (error) {
            console.error('Failed to restore clipboard:', error);
          }
          isInjecting = false;
        }, 5000);
      }
      return pasted;
    }

    async function refineTranscript(text, settings) {
      if (!settings.llmEnabled || !settings.llmApiUrl || !settings.llmApiKey) {
        return text;
      }

      setState(State.REFINING, '正在做保守纠错...');
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);

      try {
        const response = await fetch(settings.llmApiUrl, {
          method: 'POST',
          signal: controller.signal,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${settings.llmApiKey}`,
          },
          body: JSON.stringify({
            model: settings.llmModel || 'gpt-4o-mini',
            messages: [
              {
                role: 'system',
                content: 'You only fix obvious speech recognition mistakes. Do not rewrite, polish, summarize, shorten, or expand. If the text already looks correct, return it exactly unchanged. If you are unsure, keep the original. Output only the corrected plain text.',
              },
              { role: 'user', content: text },
            ],
            temperature: 0,
          }),
        });

        if (!response.ok) {
          return text;
        }

        const data = await response.json();
        return data.choices?.[0]?.message?.content?.trim() || text;
      } catch (error) {
        console.error('LLM refinement failed:', error);
        return text;
      } finally {
        clearTimeout(timeout);
      }
    }

    async function processRecording() {
      setState(State.PROCESSING, '正在把语音转换成文字...');
      const settings = await window.electronAPI.getSettings();
      const pcmBuffer = await stopAudioCapture();

      try {
        const rawTranscript = await window.electronAPI.transcribeGummy(pcmBuffer);
        if (!rawTranscript) {
          throw new Error('未识别到语音内容');
        }
        const finalTranscript = await refineTranscript(rawTranscript, settings);
        const pasted = await injectText(finalTranscript);
        setState(State.SUCCESS, pasted ? finalTranscript : `${finalTranscript}（已复制，可手动 Ctrl+V 粘贴）`);
      } catch (error) {
        console.error('Transcription failed:', error);
        setState(State.ERROR, error?.message || '转写失败');
      }

      setTimeout(() => {
        setState(State.IDLE);
        hideCapsule();
      }, 3200);
    }

    async function beginRecording() {
      showCapsule();
      smoothedLevel = 0;
      setState(State.RECORDING, '正在录音...');

      try {
        const settings = await window.electronAPI.getSettings();
        await startAudioCapture(settings.audioDeviceId);
      } catch (error) {
        console.error('Recording start failed:', error);
        setState(State.ERROR, '麦克风初始化失败');
      }
    }

    window.electronAPI.onCapsuleState(async (state) => {
      if (state === 'recording') {
        await beginRecording();
      } else if (state === 'stop' && currentState === State.RECORDING) {
        await processRecording();
      } else if (state === 'idle') {
        setState(State.IDLE);
      } else if (state === 'error') {
        setState(State.ERROR, '发生错误');
      }
    });

    createBars();
    setState(State.IDLE);
  </script>
</body>
</html>
