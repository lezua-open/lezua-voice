<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: http: ws: wss:;">
  <title>Voice Capsule</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    }
    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
    }
    .shell {
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .capsule {
      width: 260px;
      min-height: 64px;
      max-width: 640px;
      padding: 14px 18px;
      border-radius: 32px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03)),
        rgba(22, 28, 37, 0.82);
      backdrop-filter: blur(28px) saturate(1.05);
      -webkit-backdrop-filter: blur(28px) saturate(1.05);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        0 20px 45px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
      color: #f8fafc;
      opacity: 0;
      transform: translateY(10px) scale(0.97);
      transition:
        opacity 220ms ease,
        transform 220ms ease,
        width 250ms ease;
      pointer-events: auto;
    }
    .capsule.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .capsule.state-recording {
      border-color: rgba(103, 232, 249, 0.22);
    }
    .capsule.state-processing,
    .capsule.state-refining {
      border-color: rgba(148, 163, 184, 0.18);
    }
    .capsule.state-success {
      border-color: rgba(134, 239, 172, 0.22);
    }
    .capsule.state-error {
      border-color: rgba(252, 165, 165, 0.22);
    }
    .visual {
      width: 44px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 auto;
    }
    .wave-bar {
      width: 6px;
      min-height: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, #7dd3fc, #22d3ee);
      box-shadow: 0 0 14px rgba(34, 211, 238, 0.18);
      transition: height 72ms linear, opacity 140ms ease;
    }
    .text-wrap {
      min-width: 160px;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.82);
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.9;
    }
    .status-hint {
      font-size: 12px;
      color: rgba(226, 232, 240, 0.58);
      white-space: nowrap;
    }
    .transcript {
      font-size: 15px;
      line-height: 1.42;
      font-weight: 600;
      color: #f8fafc;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .transcript.subtle {
      color: rgba(248, 250, 252, 0.78);
      font-weight: 500;
    }
    .capsule.state-success .transcript {
      color: #bbf7d0;
    }
    .capsule.state-error .transcript {
      color: #fecaca;
    }
    .measurer {
      position: absolute;
      visibility: hidden;
      pointer-events: none;
      white-space: nowrap;
      font-size: 15px;
      line-height: 1.42;
      font-weight: 600;
      max-width: 520px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="capsule state-idle" id="capsule">
      <div class="visual" id="visual"></div>
      <div class="text-wrap">
        <div class="meta-row">
          <div class="badge" id="badge">
            <span class="badge-dot"></span>
            <span id="badge-text">Ready</span>
          </div>
          <div class="status-hint" id="status-hint">按一次开始，再按一次结束</div>
        </div>
        <div class="transcript subtle" id="transcript">准备就绪</div>
      </div>
    </div>
  </div>
  <span class="measurer" id="measurer"></span>

  <script>
    const State = {
      IDLE: 'idle',
      RECORDING: 'recording',
      PROCESSING: 'processing',
      REFINING: 'refining',
      SUCCESS: 'success',
      ERROR: 'error',
    };

    const BAR_WEIGHTS = [0.5, 0.8, 1.0, 0.75, 0.55];
    const ATTACK = 0.4;
    const RELEASE = 0.15;
    const MIN_BAR = 4;
    const MAX_BAR = 32;
    const TARGET_SAMPLE_RATE = 16000;
    const MIN_WIDTH = 260;
    const MAX_WIDTH = 640;

    const capsule = document.getElementById('capsule');
    const visual = document.getElementById('visual');
    const badge = document.getElementById('badge');
    const badgeText = document.getElementById('badge-text');
    const statusHint = document.getElementById('status-hint');
    const transcriptEl = document.getElementById('transcript');
    const measurer = document.getElementById('measurer');

    const bars = [];
    let currentState = State.IDLE;
    let mediaStream = null;
    let audioContext = null;
    let analyser = null;
    let analyserData = null;
    let processor = null;
    let sourceNode = null;
    let muteGain = null;
    let waveformFrame = null;
    let smoothedLevel = 0;
    let savedClipboard = '';
    let isInjecting = false;
    let lastLiveTranscript = '';

    function createBars() {
      visual.innerHTML = '';
      BAR_WEIGHTS.forEach(() => {
        const bar = document.createElement('div');
        bar.className = 'wave-bar';
        bar.style.height = `${MIN_BAR}px`;
        visual.appendChild(bar);
        bars.push(bar);
      });
    }

    function showCapsule() {
      requestAnimationFrame(() => capsule.classList.add('visible'));
    }

    function hideCapsule() {
      capsule.classList.remove('visible');
      setTimeout(() => window.electronAPI.hideCapsule(), 220);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function updateCapsuleWidth(text) {
      measurer.textContent = text || '准备就绪';
      const measured = measurer.getBoundingClientRect().width;
      const targetWidth = clamp(Math.ceil(measured) + 130, MIN_WIDTH, MAX_WIDTH);
      capsule.style.width = `${targetWidth}px`;
    }

    function updateTranscript(text, subtle = false) {
      transcriptEl.textContent = text;
      transcriptEl.classList.toggle('subtle', subtle);
      updateCapsuleWidth(text);
    }

    function setStateClass(state) {
      capsule.classList.remove(
        'state-idle',
        'state-recording',
        'state-processing',
        'state-refining',
        'state-success',
        'state-error',
      );
      capsule.classList.add(`state-${state}`);
    }

    function setState(state, text = '') {
      currentState = state;
      setStateClass(state);

      if (state === State.IDLE) {
        badgeText.textContent = 'Ready';
        statusHint.textContent = '按一次开始，再按一次结束';
        updateTranscript(text || '准备就绪', true);
        resetBars();
      } else if (state === State.RECORDING) {
        badgeText.textContent = 'Listening';
        statusHint.textContent = '正在实时转录';
        updateTranscript(text || lastLiveTranscript || '请开始说话', !text);
      } else if (state === State.PROCESSING) {
        badgeText.textContent = 'Transcribing';
        statusHint.textContent = '等待最终结果';
        updateTranscript(text || lastLiveTranscript || '正在整理识别内容...', false);
      } else if (state === State.REFINING) {
        badgeText.textContent = 'Refining';
        statusHint.textContent = '正在做保守纠错';
        updateTranscript(text || lastLiveTranscript || '正在优化文本...', false);
      } else if (state === State.SUCCESS) {
        badgeText.textContent = 'Done';
        statusHint.textContent = '已复制并尝试粘贴';
        updateTranscript(text || '已完成', false);
      } else if (state === State.ERROR) {
        badgeText.textContent = 'Error';
        statusHint.textContent = '请查看错误信息';
        updateTranscript(text || '发生错误', false);
        resetBars();
      }
    }

    function setLiveTranscript(text, isFinal) {
      if (!text) return;
      lastLiveTranscript = text;

      if (currentState === State.RECORDING) {
        statusHint.textContent = isFinal ? '已得到一句完整文本' : '正在实时转录';
        updateTranscript(text, false);
      } else if (currentState === State.PROCESSING) {
        statusHint.textContent = '等待最终结果';
        updateTranscript(text, false);
      }
    }

    function resetBars() {
      bars.forEach((bar) => {
        bar.style.height = `${MIN_BAR}px`;
      });
    }

    function floatTo16BitPCM(float32Array) {
      const output = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i += 1) {
        const sample = Math.max(-1, Math.min(1, float32Array[i]));
        output[i] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
      }
      return output;
    }

    function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
      if (outputSampleRate === inputSampleRate) {
        return buffer;
      }
      const ratio = inputSampleRate / outputSampleRate;
      const newLength = Math.round(buffer.length / ratio);
      const result = new Float32Array(newLength);
      let offsetResult = 0;
      let offsetBuffer = 0;

      while (offsetResult < result.length) {
        const nextOffsetBuffer = Math.round((offsetResult + 1) * ratio);
        let accum = 0;
        let count = 0;
        for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i += 1) {
          accum += buffer[i];
          count += 1;
        }
        result[offsetResult] = count ? accum / count : 0;
        offsetResult += 1;
        offsetBuffer = nextOffsetBuffer;
      }

      return result;
    }

    function encodePcm(floatBuffer) {
      return floatTo16BitPCM(floatBuffer).buffer;
    }

    async function startAudioCapture(deviceId) {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: deviceId && deviceId !== 'default' ? { deviceId: { exact: deviceId } } : true,
      });

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.6;
      analyserData = new Uint8Array(analyser.fftSize);

      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);
      muteGain = audioContext.createGain();
      muteGain.gain.value = 0;

      processor.onaudioprocess = (event) => {
        const input = event.inputBuffer.getChannelData(0);
        const copied = new Float32Array(input);
        const downsampled = downsampleBuffer(copied, audioContext.sampleRate, TARGET_SAMPLE_RATE);
        const pcmChunk = encodePcm(downsampled);
        window.electronAPI.dashScopeAudioChunk(pcmChunk);
      };

      sourceNode.connect(analyser);
      sourceNode.connect(processor);
      processor.connect(muteGain);
      muteGain.connect(audioContext.destination);

      animateWaveform();
    }

    function animateWaveform() {
      if (!analyser || currentState !== State.RECORDING) return;

      const draw = () => {
        if (!analyser || currentState !== State.RECORDING) return;

        analyser.getByteTimeDomainData(analyserData);
        let sum = 0;
        for (let i = 0; i < analyserData.length; i += 1) {
          const normalized = (analyserData[i] - 128) / 128;
          sum += normalized * normalized;
        }

        const rms = Math.sqrt(sum / analyserData.length);
        const target = Math.min(1, rms * 5.2);
        const easing = target > smoothedLevel ? ATTACK : RELEASE;
        smoothedLevel += (target - smoothedLevel) * easing;

        BAR_WEIGHTS.forEach((weight, index) => {
          const jitter = 1 + ((Math.random() * 0.08) - 0.04);
          const height = MIN_BAR + (MAX_BAR - MIN_BAR) * smoothedLevel * weight * jitter;
          bars[index].style.height = `${clamp(height, MIN_BAR, MAX_BAR)}px`;
        });

        waveformFrame = requestAnimationFrame(draw);
      };

      draw();
    }

    async function stopAudioCapture() {
      if (waveformFrame) {
        cancelAnimationFrame(waveformFrame);
        waveformFrame = null;
      }

      if (processor) {
        processor.disconnect();
        processor.onaudioprocess = null;
        processor = null;
      }
      if (muteGain) {
        muteGain.disconnect();
        muteGain = null;
      }
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode = null;
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
        mediaStream = null;
      }

      if (audioContext) {
        await audioContext.close();
        audioContext = null;
      }

      analyser = null;
      analyserData = null;
    }

    async function saveClipboard() {
      savedClipboard = await window.electronAPI.clipboardSave();
    }

    async function restoreClipboard() {
      await window.electronAPI.clipboardRestore(savedClipboard || '');
    }

    async function injectText(text) {
      if (isInjecting) return false;
      isInjecting = true;
      let pasted = false;
      try {
        await saveClipboard();
        await window.electronAPI.clipboardWrite(text);
        pasted = await window.electronAPI.simulatePaste();
      } finally {
        setTimeout(async () => {
          try {
            await restoreClipboard();
          } catch (error) {
            console.error('Failed to restore clipboard:', error);
          }
          isInjecting = false;
        }, 5000);
      }
      return pasted;
    }

    async function refineTranscript(text, settings) {
      if (!settings.llmEnabled || !settings.llmApiUrl || !settings.llmApiKey) {
        return text;
      }

      setState(State.REFINING, lastLiveTranscript || text || '正在优化文本...');
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);

      try {
        const response = await fetch(settings.llmApiUrl, {
          method: 'POST',
          signal: controller.signal,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${settings.llmApiKey}`,
          },
          body: JSON.stringify({
            model: settings.llmModel || 'gpt-4o-mini',
            messages: [
              {
                role: 'system',
                content: 'You only fix obvious speech recognition mistakes. Do not rewrite, polish, summarize, shorten, or expand. If the text already looks correct, return it exactly unchanged. If you are unsure, keep the original. Output only the corrected plain text.',
              },
              { role: 'user', content: text },
            ],
            temperature: 0,
          }),
        });

        if (!response.ok) {
          return text;
        }

        const data = await response.json();
        return data.choices?.[0]?.message?.content?.trim() || text;
      } catch (error) {
        console.error('LLM refinement failed:', error);
        return text;
      } finally {
        clearTimeout(timeout);
      }
    }

    async function processRecording() {
      setState(State.PROCESSING, lastLiveTranscript || '正在把语音转换成文字...');
      const settings = await window.electronAPI.getSettings();
      await stopAudioCapture();

      try {
        const rawTranscript = await window.electronAPI.dashScopeFinish();
        if (!rawTranscript) {
          throw new Error('未识别到语音内容');
        }

        const finalTranscript = await refineTranscript(rawTranscript, settings);
        const pasted = await injectText(finalTranscript);
        setState(
          State.SUCCESS,
          pasted ? finalTranscript : `${finalTranscript}（已复制，可手动 Ctrl+V 粘贴）`,
        );
      } catch (error) {
        console.error('Transcription failed:', error);
        setState(State.ERROR, error?.message || '转写失败');
      }

      setTimeout(() => {
        lastLiveTranscript = '';
        setState(State.IDLE);
        hideCapsule();
      }, 3200);
    }

    async function beginRecording() {
      showCapsule();
      smoothedLevel = 0;
      lastLiveTranscript = '';
      setState(State.RECORDING, '请开始说话');

      try {
        const settings = await window.electronAPI.getSettings();
        await window.electronAPI.dashScopeStart();
        await startAudioCapture(settings.audioDeviceId);
      } catch (error) {
        console.error('Recording start failed:', error);
        setState(State.ERROR, '麦克风初始化失败');
      }
    }

    window.electronAPI.onCapsuleState(async (state, data) => {
      if (state === 'recording') {
        await beginRecording();
        return;
      }

      if (state === 'stop' && currentState === State.RECORDING) {
        await processRecording();
        return;
      }

      if (state === 'live-transcript') {
        setLiveTranscript(data?.text || '', Boolean(data?.isFinal));
        return;
      }

      if (state === 'idle') {
        setState(State.IDLE);
        return;
      }

      if (state === 'error') {
        setState(State.ERROR, data?.message || '发生错误');
      }
    });

    createBars();
    setState(State.IDLE);
  </script>
</body>
</html>
